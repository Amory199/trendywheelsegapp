name: E2E

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Also run on the deploy workflow's completion so we catch any post-deploy
  # regression even if the deploy itself reported green.
  workflow_run:
    workflows: ["Deploy"]
    types: [completed]

jobs:
  smoke:
    name: API smoke (against live)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get update -y && sudo apt-get install -y -q jq
      - name: Run smoke
        run: bash infra/scripts/smoke.sh https://api.trendywheelseg.com

  playwright:
    name: Playwright e2e (against live)
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Install Chromium
        working-directory: e2e
        run: npx playwright install chromium --with-deps
      - name: Run Playwright
        working-directory: e2e
        env:
          E2E_BASE_URL: https://app.trendywheelseg.com
          E2E_ADMIN_URL: https://admin.trendywheelseg.com
          E2E_API_URL: https://api.trendywheelseg.com
        run: npx playwright test
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
