# Local dev: all services
# Production VPS: only minio + plausible (postgres + redis run natively)
services:
  # ── Local dev only (postgres + redis run natively on VPS) ──
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: trendywheels
      POSTGRES_PASSWORD: trendywheels
      POSTGRES_DB: trendywheels
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trendywheels"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass trendywheels_redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

  # ── MinIO (runs on VPS too) ──────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "127.0.0.1:9000:9000"   # API (proxied via Nginx cdn.trendywheelseg.com)
      - "127.0.0.1:9001:9001"   # Console (internal only)
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Plausible Analytics (runs on VPS) ────────────────────────
  plausible_db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: plausible
      POSTGRES_PASSWORD: ${PLAUSIBLE_PG_PASSWORD:-plausible_change_me}
      POSTGRES_DB: plausible_db
    volumes:
      - plausible_db_data:/var/lib/postgresql/data

  plausible_events_db:
    image: clickhouse/clickhouse-server:23-alpine
    restart: unless-stopped
    volumes:
      - plausible_events_data:/var/lib/clickhouse
      - ./plausible/clickhouse-config.xml:/etc/clickhouse-server/config.d/logging.xml:ro
      - ./plausible/clickhouse-user-config.xml:/etc/clickhouse-server/users.d/logging.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  plausible:
    image: ghcr.io/plausible/community-edition:v2
    restart: unless-stopped
    command: sh -c "sleep 10 && /entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    depends_on:
      - plausible_db
      - plausible_events_db
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      BASE_URL: https://analytics.trendywheelseg.com
      SECRET_KEY_BASE: ${PLAUSIBLE_SECRET_KEY:-CHANGE_ME_64_CHAR_RANDOM_STRING}
      DATABASE_URL: postgres://plausible:${PLAUSIBLE_PG_PASSWORD:-plausible_change_me}@plausible_db:5432/plausible_db
      CLICKHOUSE_DATABASE_URL: http://plausible_events_db:8123/plausible_events
      DISABLE_REGISTRATION: invite_only
      LOG_FAILED_LOGIN_ATTEMPTS: true

volumes:
  pg_data:
  redis_data:
  minio_data:
  plausible_db_data:
  plausible_events_data:
