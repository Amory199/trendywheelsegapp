# TrendyWheels Egypt — Nginx reverse proxy config
# Domains: *.trendywheelseg.com

# ─── API (port 4000) ──────────────────────────────────────────
server {
    listen 80;
    server_name api.trendywheelseg.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.trendywheelseg.com;

    ssl_certificate /etc/letsencrypt/live/api.trendywheelseg.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.trendywheelseg.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    # Rate limit zone (defined in nginx.conf http block)
    # limit_req zone=api burst=20 nodelay;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}

