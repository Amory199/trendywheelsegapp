# ─── MinIO CDN (port 9000) ────────────────────────────────────
server {
    listen 80;
    server_name cdn.trendywheelseg.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cdn.trendywheelseg.com;

    ssl_certificate /etc/letsencrypt/live/cdn.trendywheelseg.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cdn.trendywheelseg.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 100M;

    # Cache static assets
    location ~* \.(jpg|jpeg|png|webp|gif|svg|mp4|pdf)$ {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

